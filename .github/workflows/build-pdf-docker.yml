name: Build LaTeX (Docker) and publish

on:
  workflow_dispatch:
  push:
    paths:
      - '**/*.tex'
      - 'index.tex'
      - '.github/workflows/**'

permissions:
  contents: read
  packages: read
  pages: write
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # If your GHCR image is public you can omit this login step.
      # If it's private, create a repo secret GHCR_PAT with a PAT that has read:packages
      - name: Log in to ghcr (optional, needed only if image is private)
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Pull LaTeX image (may be cached)
        run: docker pull ghcr.io/athiclairs/latex:latest || true

      - name: Build PDF using Docker image
        run: |
          set -e
          if [ ! -f index.tex ]; then
            echo "index.tex not found in repo root. Exiting."
            exit 1
          fi
          mkdir -p site
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            ghcr.io/athiclairs/latex:latest \
            bash -lc "pdflatex -interaction=nonstopmode -halt-on-error -output-directory=site index.tex || (echo 'pdflatex failed'; exit 2); pdflatex -interaction=nonstopmode -halt-on-error -output-directory=site index.tex || true"

      - name: Create index.html that embeds the PDF
        run: |
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="vi">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Document</title>
            <style>html,body { height:100%; margin:0; } .pdf-frame { width:100%; height:100vh; border:none; } .fallback { padding: 2rem; font-family: Arial, sans-serif; }</style>
          </head>
          <body>
            <iframe class="pdf-frame" src="index.pdf"></iframe>
            <div class="fallback">If your browser cannot display the embedded PDF, download it: <a href="index.pdf">Download PDF</a>.</div>
          </body>
          </html>
          HTML

      - name: Add .nojekyll
        run: touch site/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
