name: Build PDF (compact TeX) and publish

on:
  push:
    paths:
      - '**/*.tex'
      - '.github/workflows/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install compact TeX packages
        run: |
          sudo apt-get update -y
          # compact set oriented to math documents (much smaller than texlive-full)
          sudo apt-get install -y \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-math-extra \
            fonts-dejavu-core \
            poppler-utils

      - name: Try to build PDF with pdflatex (compact install)
        id: build_try
        run: |
          mkdir -p site
          set -o pipefail
          # run pdflatex twice for references if needed; capture exit status
          pdflatex -interaction=nonstopmode -halt-on-error -output-directory=site index.tex > site/pdflatex.log 2>&1 || true
          pdflatex -interaction=nonstopmode -halt-on-error -output-directory=site index.tex >> site/pdflatex.log 2>&1 || true
          if [ -f site/index.pdf ]; then
            echo "compiled=1" >> $GITHUB_OUTPUT
          else
            echo "compiled=0" >> $GITHUB_OUTPUT
          fi

      - name: If build failed, install full texlive and retry
        if: steps.build_try.outputs.compiled == '0'
        run: |
          echo "Compact build failed; installing texlive-full (this may take ~10-25 minutes) and retrying..."
          sudo apt-get update -y
          sudo apt-get install -y texlive-full
          # retry build (twice)
          pdflatex -interaction=nonstopmode -halt-on-error -output-directory=site index.tex > site/pdflatex.log 2>&1 || true
          pdflatex -interaction=nonstopmode -halt-on-error -output-directory=site index.tex >> site/pdflatex.log 2>&1 || true
          if [ -f site/index.pdf ]; then
            echo "Full build succeeded"
          else
            echo "PDF build still failed; see site/pdflatex.log"
            cat site/pdflatex.log
            exit 1
          fi

      - name: Create index.html that embeds the PDF
        run: |
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="vi">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <title>Home</title>
            <style>html,body{height:100%;margin:0}embed{width:100%;height:100vh;border:none}</style>
          </head>
          <body>
            <embed src="index.pdf" type="application/pdf">
          </body>
          </html>
          HTML

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
