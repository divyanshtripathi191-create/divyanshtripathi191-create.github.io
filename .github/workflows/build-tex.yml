name: Build PDF and publish (full TeX Live + inline viewer with drawing)

on:
  push:
    paths:
      - '**/*.tex'
      - '.github/workflows/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install full TeX Live (large, ~1.5-3GB)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y texlive-full

      - name: Build PDF with pdflatex
        run: |
          mkdir -p site
          pdflatex -interaction=nonstopmode -halt-on-error -output-directory=site index.tex > site/pdflatex.log 2>&1 || true
          pdflatex -interaction=nonstopmode -halt-on-error -output-directory=site index.tex >> site/pdflatex.log 2>&1 || true
          if [ ! -f site/index.pdf ]; then
            echo "PDF not produced; printing log" && sed -n '1,400p' site/pdflatex.log || true
            exit 1
          fi

      - name: Create index.html that renders the PDF with PDF.js + drawing overlay
        run: |
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="vi">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <title>Home</title>
            <style>
              :root{--toolbar-size:56px}
              html,body{height:100%;margin:0;background:#f7f7f7;color:#111}
              #viewer{width:100%;max-width:1100px;margin:0 auto;padding:12px;box-sizing:border-box}
              .page-wrapper{position:relative;margin:12px 0;display:block}
              canvas.pdf-canvas{display:block;max-width:100%;height:auto}
              canvas.overlay-canvas{position:absolute;left:0;top:0;pointer-events:auto}
              /* floating toolbar */
              #toolbar{
                position:fixed; right:18px; bottom:18px;
                width:var(--toolbar-size); height:var(--toolbar-size);
                background:#0078d4; border-radius:50%; box-shadow:0 6px 18px rgba(0,0,0,0.25);
                display:flex; align-items:center; justify-content:center; z-index:9999;
                cursor:pointer; transition:width 0.18s ease,height 0.18s ease;
              }
              #toolbar.expanded{width:320px;height:auto;padding:12px;border-radius:12px;flex-direction:column;align-items:flex-start}
              #toolbar .main-btn{width:40px;height:40px;background:transparent;border:none;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center}
              #tools{display:none;width:100%}
              #toolbar.expanded #tools{display:block}
              .tool-row{display:flex;align-items:center;gap:8px;margin:6px 0;width:100%}
              .tool-row label{font-size:13px;color:#fff;margin-right:6px;min-width:36px}
              input[type="color"]{width:36px;height:36px;border-radius:6px;border:none;padding:0}
              input[type="range"]{flex:1}
              .btn{background:#fff;color:#000;border:none;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:13px}
              .small{padding:6px;border-radius:6px;font-size:13px}
              #status{color:#fff;font-size:12px;margin-top:6px}
              /* loading */
              #loading{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;padding:12px;text-align:center}
            </style>
          </head>
          <body>
            <div id="loading">Đang tải tài liệu…</div>
            <div id="viewer" style="display:none"></div>

            <!-- PDF.js from CDN -->
            <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
            <script>
              // worker
              pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
              const url = 'index.pdf';
              const viewer = document.getElementById('viewer');
              const loading = document.getElementById('loading');

              // storage prefix
              const storagePrefix = 'athiclairs-annot-' + url;

              // per-page stroke storage (in-memory)
              const strokesByPage = {}; // page -> array of strokes
              // stroke: {color, size, points:[{x,y},...] } (normalized coordinates [0..1])

              function saveStrokes(page) {
                try {
                  localStorage.setItem(storagePrefix + '-p' + page, JSON.stringify(strokesByPage[page]||[]));
                } catch(e) { console.warn('save failed', e); }
              }
              function loadStrokes(page) {
                try {
                  const raw = localStorage.getItem(storagePrefix + '-p' + page);
                  return raw ? JSON.parse(raw) : [];
                } catch(e){ return []; }
              }

              function setCanvasSizeToViewport(pdfCanvas, overlay) {
                // ensure overlay matches pdf canvas pixel size
                overlay.width = pdfCanvas.width;
                overlay.height = pdfCanvas.height;
                overlay.style.width = pdfCanvas.style.width || pdfCanvas.width + 'px';
                overlay.style.height = pdfCanvas.style.height || pdfCanvas.height + 'px';
                overlay.style.left = pdfCanvas.offsetLeft + 'px';
                overlay.style.top = pdfCanvas.offsetTop + 'px';
              }

              // Create floating toolbar
              const toolbar = document.createElement('div'); toolbar.id = 'toolbar';
              toolbar.innerHTML = `
                <button class="main-btn" title="Drawing tools" aria-label="tools">✎</button>
                <div id="tools" aria-hidden="true">
                  <div class="tool-row"><label>Color</label><input id="color" type="color" value="#ff0000"></div>
                  <div class="tool-row"><label>Size</label><input id="size" type="range" min="1" max="40" value="3"></div>
                  <div class="tool-row" style="justify-content:space-between">
                    <div style="display:flex;gap:6px">
                      <button id="undo" class="btn small">Undo</button>
                      <button id="clear" class="btn small">Clear</button>
                    </div>
                    <div style="display:flex;gap:6px">
                      <button id="download" class="btn small">Download page</button>
                    </div>
                  </div>
                  <div id="status">Mode: <span id="mode">View</span></div>
                </div>
              `;
              document.body.appendChild(toolbar);

              const mainBtn = toolbar.querySelector('.main-btn');
              const toolsBox = toolbar.querySelector('#tools');
              const modeText = toolbar.querySelector('#mode');
              let drawingEnabled = false;
              let activeOverlay = null; // overlay canvas that is currently being drawn on
              let activePage = null;

              // expand/collapse toolbar
              let expanded = false;
              mainBtn.addEventListener('click', (e)=>{
                expanded = !expanded;
                if (expanded) {
                  toolbar.classList.add('expanded');
                  toolsBox.setAttribute('aria-hidden','false');
                } else {
                  toolbar.classList.remove('expanded');
                  toolsBox.setAttribute('aria-hidden','true');
                }
              });

              // tool elements
              const colorInput = toolbar.querySelector('#color');
              const sizeInput = toolbar.querySelector('#size');
              const undoBtn = toolbar.querySelector('#undo');
              const clearBtn = toolbar.querySelector('#clear');
              const downloadBtn = toolbar.querySelector('#download');

              // helper: redraw overlay from strokes
              function redrawOverlay(overlay, page) {
                const ctx = overlay.getContext('2d');
                // clear
                ctx.clearRect(0,0,overlay.width,overlay.height);
                const strokes = strokesByPage[page]||[];
                for (const s of strokes) {
                  ctx.strokeStyle = s.color;
                  ctx.lineWidth = s.size * (overlay.width / (overlay.clientWidth||overlay.width));
                  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
                  ctx.beginPath();
                  const points = s.points;
                  if (!points || points.length===0) continue;
                  const first = points[0];
                  ctx.moveTo(first.x*overlay.width, first.y*overlay.height);
                  for (let i=1;i<points.length;i++){
                    const p = points[i]; ctx.lineTo(p.x*overlay.width, p.y*overlay.height);
                  }
                  ctx.stroke();
                }
              }

              // pointer drawing logic per overlay
              function attachDrawing(overlay, page) {
                overlay.style.touchAction = 'none';
                let drawing = false;
                let currentStroke = null;
                overlay.addEventListener('pointerdown', (ev) => {
                  // start drawing only if drawingEnabled
                  if (!drawingEnabled) return;
                  overlay.setPointerCapture(ev.pointerId);
                  drawing = true;
                  const r = overlay.getBoundingClientRect();
                  const x = (ev.clientX - r.left) / r.width;
                  const y = (ev.clientY - r.top) / r.height;
                  currentStroke = { color: colorInput.value, size: parseInt(sizeInput.value,10), points: [{x,y}] };
                  strokesByPage[page] = strokesByPage[page] || loadStrokes(page) || [];
                });
                overlay.addEventListener('pointermove', (ev) => {
                  if (!drawing) return;
                  const r = overlay.getBoundingClientRect();
                  const x = (ev.clientX - r.left) / r.width;
                  const y = (ev.clientY - r.top) / r.height;
                  currentStroke.points.push({x,y});
                  // draw current stroke incrementally
                  const ctx = overlay.getContext('2d');
                  const lastIndex = currentStroke.points.length - 1;
                  if (lastIndex>=1) {
                    const p1 = currentStroke.points[lastIndex-1];
                    const p2 = currentStroke.points[lastIndex];
                    ctx.strokeStyle = currentStroke.color;
                    ctx.lineWidth = currentStroke.size * (overlay.width / (overlay.clientWidth||overlay.width));
                    ctx.lineJoin='round'; ctx.lineCap='round';
                    ctx.beginPath();
                    ctx.moveTo(p1.x*overlay.width, p1.y*overlay.height);
                    ctx.lineTo(p2.x*overlay.width, p2.y*overlay.height);
                    ctx.stroke();
                  }
                });
                const finish = (ev) => {
                  if (!drawing) return;
                  drawing = false;
                  strokesByPage[page].push(currentStroke);
                  saveStrokes(page);
                  currentStroke = null;
                  try { overlay.releasePointerCapture(ev.pointerId); } catch(e){}
                };
                overlay.addEventListener('pointerup', finish);
                overlay.addEventListener('pointercancel', finish);
                // load saved strokes initially
                strokesByPage[page] = loadStrokes(page);
                redrawOverlay(overlay, page);
              }

              // undo/clear/download apply to activeOverlay/activePage
              undoBtn.addEventListener('click', ()=>{
                if (!activeOverlay || activePage==null) return;
                const arr = strokesByPage[activePage] || [];
                if (arr.length>0) {
                  arr.pop();
                  saveStrokes(activePage);
                  redrawOverlay(activeOverlay, activePage);
                }
              });
              clearBtn.addEventListener('click', ()=>{
                if (!activeOverlay || activePage==null) return;
                strokesByPage[activePage] = [];
                saveStrokes(activePage);
                redrawOverlay(activeOverlay, activePage);
              });
              downloadBtn.addEventListener('click', ()=>{
                if (!activeOverlay || activePage==null) return;
                // combine pdf canvas and overlay into single image
                const pdfCanvas = document.getElementById('pdf-canvas-' + activePage);
                if (!pdfCanvas) return;
                const off = document.createElement('canvas');
                off.width = pdfCanvas.width; off.height = pdfCanvas.height;
                const ctx = off.getContext('2d');
                ctx.drawImage(pdfCanvas, 0, 0);
                ctx.drawImage(activeOverlay, 0, 0);
                off.toBlob(function(blob){
                  const a = document.createElement('a');
                  a.href = URL.createObjectURL(blob);
                  a.download = 'page-' + activePage + '-annotated.png';
                  document.body.appendChild(a);
                  a.click();
                  a.remove();
                });
              });

              // toggle drawing mode when clicking toolbar header (mainBtn double purpose)
              // For quick toggle, double-click the main button; or use expanded toolbar Mode text
              mainBtn.addEventListener('dblclick', ()=>{
                drawingEnabled = !drawingEnabled;
                modeText.textContent = drawingEnabled ? 'Draw' : 'View';
                mainBtn.style.transform = drawingEnabled ? 'rotate(20deg)' : 'none';
              });

              // Helper: pick active page by pointer events - overlay will set itself as active when pointerdown occurs
              function makeOverlayActiveOnPointer(overlay, page) {
                overlay.addEventListener('pointerdown', (ev)=>{
                  activeOverlay = overlay; activePage = page;
                  // bring overlay z-index above others
                  overlay.style.zIndex = 50;
                });
                overlay.addEventListener('pointerup', (ev)=>{
                  // after finishing, leave as active
                });
              }

              // Render PDF and create overlays
              pdfjsLib.getDocument(url).promise.then(function(pdf) {
                loading.style.display = 'none';
                viewer.style.display = 'block';
                const total = pdf.numPages;
                const renderPage = (i) => {
                  pdf.getPage(i).then(function(page) {
                    const scale = (window.devicePixelRatio || 1) * 1.2;
                    const viewport = page.getViewport({scale});
                    const wrapper = document.createElement('div');
                    wrapper.className = 'page-wrapper';
                    // pdf canvas
                    const pdfCanvas = document.createElement('canvas');
                    pdfCanvas.id = 'pdf-canvas-' + i;
                    pdfCanvas.className = 'pdf-canvas';
                    pdfCanvas.width = Math.round(viewport.width);
                    pdfCanvas.height = Math.round(viewport.height);
                    pdfCanvas.style.width = Math.min(viewport.width,1000) + 'px';
                    pdfCanvas.style.height = (pdfCanvas.height * (parseFloat(pdfCanvas.style.width) / pdfCanvas.width)) + 'px';
                    const ctx = pdfCanvas.getContext('2d');
                    wrapper.appendChild(pdfCanvas);
                    // overlay canvas
                    const overlay = document.createElement('canvas');
                    overlay.id = 'overlay-' + i;
                    overlay.className = 'overlay-canvas';
                    // CSS positioning to overlay exactly
                    overlay.style.left = '0';
                    overlay.style.top = '0';
                    overlay.style.pointerEvents = 'auto';
                    overlay.style.zIndex = 10;
                    wrapper.appendChild(overlay);
                    viewer.appendChild(wrapper);

                    // render pdf page
                    page.render({canvasContext: ctx, viewport: viewport}).promise.then(function(){
                      // after PDF canvas rendered, size overlay to match
                      // set overlay CSS to match displayed width/height and absolute position
                      overlay.style.position = 'absolute';
                      overlay.style.width = pdfCanvas.style.width;
                      overlay.style.height = pdfCanvas.style.height;
                      // set overlay pixel dimensions proportionally to pdfCanvas backing pixels
                      const displayWidth = parseFloat(pdfCanvas.style.width);
                      const ratio = pdfCanvas.width / displayWidth;
                      overlay.width = pdfCanvas.width;
                      overlay.height = Math.round(parseFloat(overlay.style.height) * ratio);
                      overlay.style.left = pdfCanvas.offsetLeft + 'px';
                      overlay.style.top = pdfCanvas.offsetTop + 'px';

                      // attach drawing handlers and active-selection
                      attachDrawing(overlay, i);
                      makeOverlayActiveOnPointer(overlay, i);

                      // Re-draw strokes at correct scale
                      redrawOverlay(overlay, i);

                      // keep overlay and pdf canvas responsive on window resize
                      window.addEventListener('resize', function(){
                        // recalc displayed size and overlay pixel dims
                        const displayW = Math.min(viewport.width, 1000);
                        pdfCanvas.style.width = displayW + 'px';
                        pdfCanvas.style.height = (pdfCanvas.height * (displayW / pdfCanvas.width)) + 'px';
                        // recalc overlay pixel size
                        const ratio2 = pdfCanvas.width / parseFloat(pdfCanvas.style.width);
                        overlay.style.width = pdfCanvas.style.width;
                        overlay.style.height = pdfCanvas.style.height;
                        overlay.width = pdfCanvas.width;
                        overlay.height = Math.round(parseFloat(overlay.style.height) * ratio2);
                        redrawOverlay(overlay, i);
                      });
                    });
                  });
                };
                // render all pages sequentially
                const renderNext = (p) => { if (p>total) return; renderPage(p); setTimeout(()=>renderNext(p+1), 100); };
                renderNext(1);
              }).catch(function(err){
                loading.textContent = 'Không thể tải tài liệu: ' + (err && err.message ? err.message : err);
                console.error(err);
              });
            </script>
          </body>
          </html>
          HTML

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
