name: Build TeX -> HTML and Publish

on:
  push:
    paths:
      - '**/*.tex'
      - 'templates/**'
      - '.github/workflows/tex-to-html.yml'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc and TeX Live
        run: |
          sudo apt-get update -y
          sudo apt-get install -y pandoc texlive-latex-recommended texlive-fonts-recommended texlive-luatex

      - name: Prepare output directory
        run: mkdir -p site

      - name: Convert .tex files to HTML using pandoc
        run: |
          shopt -s nullglob
          for f in *.tex; do
            out="site/${f%.tex}.html"
            echo "Converting $f -> $out"
            pandoc "$f" \
              --from=latex \
              --to=html5 \
              --template=templates/pandoc-template.html \
              --mathjax \
              -s -o "$out"
          done

      - name: Deploy to GitHub Pages (gh-pages)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
